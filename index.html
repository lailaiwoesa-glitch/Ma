<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(270deg, #ff6a88, #ff99ac, #ffc3a0);
  background-size: 600% 600%;
  animation: bgMove 10s infinite;
  text-align: center;
  font-family: Arial;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

h1 {
  margin-top: 120px;
  font-size: 32px;
  color: white;
  text-shadow: 0 0 10px red, 0 0 20px pink;
  animation: fadeIn 3s;
}

p {
  color: white;
  font-size: 18px;
  animation: fadeIn 5s;
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  border: none;
  background: white;
  color: red;
  font-size: 18px;
  border-radius: 30px;
  box-shadow: 0 0 10px pink;
}

button:hover {
  background: pink;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* ❤️ floating hearts */
.heart {
  position: absolute;
  color: red;
  font-size: 22px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1;}
  100% { transform: translateY(-10vh); opacity: 0;}
}
</style>
</head>

<body>

<h1>ကျတော် မThawThawကို အရမ်းချစ်တယ် ❤️</h1>
<h1>မရဲ့အနား ထာဝရရှိသွားချင်ပါတယ်💖</p>

<button onclick="love()">Click Me 💌</button>

<script>
function love() {
  alert("Will you be mine? 💖");
}

// hearts generator
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.animationDuration = (Math.random()*3+3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 200);
</script>

</body>
</html>

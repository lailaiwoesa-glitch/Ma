<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(270deg,#ff6a88,#ff99ac,#ffc3a0);
  background-size: 600% 600%;
  animation: bg 10s infinite;
}

@keyframes bg {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

h1 {
  margin-top: 120px;
  color: white;
  font-size: 32px;
  text-shadow: 0 0 10px red;
}

p {
  color: white;
  font-size: 18px;
}

.btn {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
}

#yes {
  background: white;
  color: red;
}

#no {
  background: black;
  color: white;
  position: absolute;
}

.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<h1>ကျတော် မကို အရမ်းချစ်တယ် ❤️</h1>
<p>မနဲ့အတူရှိချင်ပါတယ် 💖</p>

<button id="yes" class="btn" onclick="yes()">Yes 💖</button>
<button id="no" class="btn">No 😢</button>

<!-- 🎵 Music -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
function yes() {
  alert("Yayyy 💖 အမကို// No button move 😂
let noBtn = document.getElementById("no");
noBtn.onmouseover = function() {
  noBtn.style.left = Math.random()*80 + "vw";
  noBtn.style.top = Math.random()*80 + "vh";
};

// hearts
setInterval(() => {
  let h = document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);

  setTimeout(()=>{h.remove();},5000);
},200);
</script>

</body>
</html>

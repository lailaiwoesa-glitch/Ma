<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  text-align: center;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  font-family: Arial;
}

h1 {
  margin-top: 100px;
  color: white;
  font-size: 28px;
  animation: fadeIn 3s;
}

p {
  color: white;
  font-size: 18px;
  animation: fadeIn 5s;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: red;
  color: white;
  font-size: 18px;
  border-radius: 20px;
}

button:hover {
  background: darkred;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* ❤️ hearts falling */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<h1>ကျတော် အမကို အရမ်းချစ်တယ် ❤️</h1>
<p>မင်းနဲ့အတူရှိချင်ပါတယ် 💖</p>

<button onclick="showLove()">Click Me 💌</button>

<script>
function showLove() {
  alert("မင်းကိုချစ်တယ် 💖 Will you be mine?");
}

// generate hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random()*3+2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
